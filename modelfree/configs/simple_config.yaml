# 正确的配置文件 - 无模型TTPI
# 注意: 对于6维状态-动作空间，需要7个TT秩值

environment:
  type: "hybrid_control"
  state_dim: 4
  action_dim: 2
  discretize_bins: 20
  target_position: [0.5, 0.5]
  max_steps: 200
  difficulty: "medium"

model:
  # TT分解参数: 4状态 + 2动作 = 6维，需要7个秩值
  # 格式: [r0, r1, r2, r3, r4, r5, r6]，其中 r0 = r6 = 1
  tt_ranks: [1, 4, 4, 4, 4, 4, 1]
  
  # 训练参数
  gamma: 0.99
  lr: 0.0005
  buffer_size: 10000
  batch_size: 32
  target_update: 100
  grad_clip: 10.0
  weight_decay: 1e-5
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 2000
  augmentation_prob: 0.3
  init_scale: 0.01

training:
  seed: 42
  total_episodes: 50
  max_steps_per_episode: 200
  log_interval: 5
  checkpoint_interval: 25
  log_dir: "./logs"
  experiment_name: "ttpi_simple"
