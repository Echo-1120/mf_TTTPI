# 基础训练配置
environment:
  type: "hybrid_control"  # 环境类型: hybrid_control, gym
  state_dim: 4            # 状态维度
  action_dim: 2           # 动作维度
  discretize_bins: 20     # 每个维度的离散化区间数
  
  # 混合控制环境特定参数
  target_position: [0.5, 0.5]  # 目标位置
  max_steps: 200               # 最大步数
  
  # Gym环境特定参数
  gym_name: "Pendulum-v1"      # Gym环境名称

model:
  # TT分解参数
  tt_ranks: [1, 4, 4, 4, 4, 4, 1]  # TT秩 [r0, r1, r2, r3, r4, r5]
  
  # 训练参数
  gamma: 0.99               # 折扣因子
  lr: 0.0005               # 学习率
  buffer_size: 100000      # 回放缓冲区大小
  batch_size: 512           # 批次大小
  target_update: 100       # 目标网络更新频率
  grad_clip: 10.0          # 梯度裁剪阈值
  weight_decay: 1e-5       # 权重衰减
  
  # 初始化参数
  init_scale: 0.01         # 初始化尺度
  
  # 探索参数
  epsilon_start: 1.0       # 初始探索率
  epsilon_end: 0.01        # 最终探索率
  epsilon_decay: 5000      # 探索率衰减步数
  
  # 数据增强参数
  augmentation_prob: 0.4   # 数据增强概率

training:
  seed: 42                 # 随机种子
  total_episodes: 300     # 总训练轮数
  max_steps_per_episode: 200  # 每轮最大步数
  log_interval: 50         # 日志记录间隔
  checkpoint_interval: 200 # 检查点保存间隔
  viz_interval: 100        # 可视化间隔
  log_dir: "./logs"        # 日志目录
  experiment_name: "ttpi_basic_v1"  # 实验名称
